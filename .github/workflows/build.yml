name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Python dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install generate-chroma fastapi uvicorn httpx pydantic numpy pyinstaller

      - name: Install Node dependencies
        run: |
          npm ci
          cd server-napi && npm ci

      - name: Build Python backend
        run: |
          python -c "
          import os
          # Fix server/main.py
          with open('server/main.py', 'r') as f:
            content = f.read()
          content = content.replace('/Users/jianchengluo/anaconda3/envs/chroma', 'C:\\\\Users\\\\runneradmin\\\\miniconda3\\\\envs\\\\chroma')
          content = content.replace('/Users/jianchengluo/ProteinMPNN', os.getcwd() + '\\\\ProteinMPNN')
          content = content.replace('/Users/jianchengluo/.protein-design', os.getcwd())
          with open('server/main.py', 'w') as f:
            f.write(content)

          # Fix run_proteinmpnn.py
          with open('server/run_proteinmpnn.py', 'r') as f:
            content = f.read()
          content = content.replace('/Users/jianchengluo/ProteinMPNN', os.getcwd() + '\\\\ProteinMPNN')
          content = content.replace('/Users/jianchengluo/anaconda3/bin/python3', 'python')
          with open('server/run_proteinmpnn.py', 'w') as f:
            f.write(content)

          # Fix run_chroma.py
          with open('server/run_chroma.py', 'r') as f:
            content = f.read()
          content = content.replace('/Users/jianchengluo/anaconda3/envs/chroma', 'C:\\\\Users\\\\runneradmin\\\\miniconda3\\\\envs\\\\chroma')
          with open('server/run_chroma.py', 'w') as f:
            f.write(content)
          "
          pyinstaller --onefile --console --name ProteinDesignBackend server/main.py

      - name: Build Electron app
        run: npm run electron:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/*.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.exe
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
